<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Matrix multiplication solution diagram</title>
  <desc id="desc">A visual guide for multiplying rows of matrix A with columns of matrix B.</desc>
  <rect width="960" height="540" rx="28" fill="#f8fafc"/>
  <rect x="38" y="38" width="884" height="464" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="3"/>
  <text x="70" y="94" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Matrix Multiplication</text>
  <text x="70" y="130" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="18">Multiply each row of A with each column of B to form the product matrix.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">
    <text x="190" y="196" fill="#185fa5">Matrix A</text>
    <text x="476" y="196" fill="#0f766e">Matrix B</text>
    <text x="744" y="196" fill="#111827">A × B</text>
  </g>
  <g transform="translate(95 230)" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">
    <rect width="190" height="150" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="3"/>
    <rect x="22" y="24" width="60" height="44" rx="8" fill="#dbeafe"/>
    <rect x="108" y="24" width="60" height="44" rx="8" fill="#ffffff"/>
    <rect x="22" y="84" width="60" height="44" rx="8" fill="#ffffff"/>
    <rect x="108" y="84" width="60" height="44" rx="8" fill="#ffffff"/>
    <text x="52" y="55" fill="#1e40af">a</text><text x="138" y="55" fill="#334155">b</text>
    <text x="52" y="115" fill="#334155">c</text><text x="138" y="115" fill="#334155">d</text>
  </g>
  <text x="342" y="318" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">×</text>
  <g transform="translate(390 230)" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">
    <rect width="190" height="150" rx="16" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="3"/>
    <rect x="22" y="24" width="60" height="44" rx="8" fill="#d1fae5"/>
    <rect x="108" y="24" width="60" height="44" rx="8" fill="#ffffff"/>
    <rect x="22" y="84" width="60" height="44" rx="8" fill="#d1fae5"/>
    <rect x="108" y="84" width="60" height="44" rx="8" fill="#ffffff"/>
    <text x="52" y="55" fill="#047857">e</text><text x="138" y="55" fill="#334155">f</text>
    <text x="52" y="115" fill="#047857">g</text><text x="138" y="115" fill="#334155">h</text>
  </g>
  <text x="636" y="318" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">=</text>
  <g transform="translate(684 230)" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="800" text-anchor="middle">
    <rect width="210" height="150" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="3"/>
    <rect x="18" y="25" width="174" height="44" rx="8" fill="#eef2ff"/>
    <text x="105" y="54" fill="#111827">ae + bg</text>
    <rect x="18" y="86" width="174" height="44" rx="8" fill="#ffffff"/>
    <text x="105" y="115" fill="#334155">ce + dg</text>
  </g>
  <text x="112" y="443" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">First result cell = first row of A · first column of B</text>
</svg>
