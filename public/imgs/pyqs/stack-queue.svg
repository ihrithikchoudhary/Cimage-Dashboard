<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Stack and queue solution diagram</title>
  <desc id="desc">Comparison of stack LIFO and queue FIFO operations.</desc>
  <rect width="960" height="540" rx="28" fill="#f8fafc"/>
  <rect x="38" y="38" width="884" height="464" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="3"/>
  <text x="70" y="94" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Stack vs Queue</text>
  <text x="70" y="130" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="18">Stack removes the latest inserted item. Queue removes the earliest inserted item.</text>
  <g transform="translate(120 185)" font-family="Segoe UI, Arial, sans-serif">
    <text x="120" y="0" fill="#185fa5" font-size="28" font-weight="900" text-anchor="middle">Stack: LIFO</text>
    <rect x="48" y="44" width="144" height="54" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <rect x="48" y="108" width="144" height="54" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="48" y="172" width="144" height="54" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="120" y="80" fill="#1e40af" font-size="22" font-weight="800" text-anchor="middle">Top</text>
    <text x="120" y="144" fill="#334155" font-size="22" font-weight="800" text-anchor="middle">Item 2</text>
    <text x="120" y="208" fill="#334155" font-size="22" font-weight="800" text-anchor="middle">Item 1</text>
    <path d="M228 70h74" stroke="#185fa5" stroke-width="5" stroke-linecap="round"/>
    <path d="M292 58l18 12-18 12" fill="none" stroke="#185fa5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="272" y="110" fill="#475569" font-size="18" font-weight="700" text-anchor="middle">pop</text>
  </g>
  <g transform="translate(492 185)" font-family="Segoe UI, Arial, sans-serif">
    <text x="178" y="0" fill="#0f766e" font-size="28" font-weight="900" text-anchor="middle">Queue: FIFO</text>
    <rect x="0" y="98" width="96" height="68" rx="12" fill="#d1fae5" stroke="#86efac" stroke-width="2"/>
    <rect x="112" y="98" width="96" height="68" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <rect x="224" y="98" width="96" height="68" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="48" y="140" fill="#047857" font-size="22" font-weight="800" text-anchor="middle">Front</text>
    <text x="160" y="140" fill="#334155" font-size="22" font-weight="800" text-anchor="middle">Item 2</text>
    <text x="272" y="140" fill="#334155" font-size="22" font-weight="800" text-anchor="middle">Rear</text>
    <path d="M-54 132h42" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
    <path d="M-44 120l-18 12 18 12" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-34" y="178" fill="#475569" font-size="18" font-weight="700" text-anchor="middle">dequeue</text>
    <path d="M332 132h42" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
    <path d="M364 120l18 12-18 12" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="354" y="178" fill="#475569" font-size="18" font-weight="700" text-anchor="middle">enqueue</text>
  </g>
</svg>
